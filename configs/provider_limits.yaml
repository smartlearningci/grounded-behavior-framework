# Limites locais conservadores e configuráveis para segurança operacional.
# Não representam quotas oficiais; os limites reais dos providers podem mudar.
manual:
  enabled: false
  min_delay_seconds: 0
  max_requests_per_minute: null
  max_requests_per_day: null
  max_consecutive_requests: 1
  max_job_attempts: 1
  cooldown_after_rate_limit_seconds: 60

